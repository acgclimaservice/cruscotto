<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clienti - Sistema Gestione DDT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=3">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/">🏠 Dashboard</a></li>
            </ul>
        </nav>

        <div class="ddt-header">
            <h1>👥 Anagrafica Clienti ({{ clienti|length }})</h1>
            <div class="filters">
                <button class="btn btn-secondary" onclick="document.getElementById('clientiFileInput').click()">📤 Importa Excel</button>
                <button class="btn btn-success">+ Nuovo Cliente</button>
                <button class="btn btn-danger" onclick="eliminaTuttiClienti()">🗑️ Elimina Tutti</button>
                <input type="file" id="clientiFileInput" style="display:none" accept=".xlsx,.xls" onchange="uploadClienteFile(this)">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Ragione Sociale</th>
                        <th>P.IVA</th>
                        <th>Città</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cliente in clienti %}
                    <tr>
                        <td><strong>{{ cliente.ragione_sociale }}</strong></td>
                        <td>{{ cliente.partita_iva or '' }}</td>
                        <td>{{ cliente.citta or '' }}</td>
                        <td>{{ cliente.email or '' }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px;">
                            👥 Nessun cliente presente
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
    function uploadClienteFile(input) {
        if (input.files && input.files[0]) {
            const formData = new FormData();
            formData.append("file", input.files[0]);
            
            fetch("/clienti/importa", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message || `Importati: ${data.importati} clienti`);
                location.reload();
            })
            .catch(err => alert("Errore: " + err));
        }
    }

    function eliminaTuttiClienti() {
        if (confirm("ATTENZIONE: Eliminare TUTTI i clienti?")) {
            fetch("/clienti/elimina-tutti", {method: "POST"})
            .then(res => res.json())
            .then(data => {
                alert(`Eliminati: ${data.eliminati} clienti`);
                location.reload();
            });
        }
    }
    </script>
</body>
</html>
