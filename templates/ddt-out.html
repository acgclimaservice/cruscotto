<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDT OUT - Sistema Gestione DDT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=3">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/">🏠 Dashboard</a></li>
            </ul>
        </nav>

        <div class="ddt-header">
            <h1>📤 DDT in Uscita</h1>
            <div class="filters">
                <input type="date" placeholder="Data da">
                <input type="date" placeholder="Data a">
                <input type="text" placeholder="Cerca cliente...">
                <input type="text" placeholder="N° DDT...">
                <select>
                    <option>Tutti gli stati</option>
                    <option>Bozza</option>
                    <option>Confermato</option>
                </select>
                <button class="btn">Filtra</button>
                <button class="btn btn-secondary">Reset</button>
                <button class="btn btn-success" onclick="location.href='/ddt/out/nuovo'">+ Nuovo DDT</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>N° DDT</th>
                        <th>Data DDT</th>
                        <th>Destinazione</th>
                        <th>Magazzino</th>
                        <th>Stato</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    {% for ddt in ddts %}
                    <tr class="{{ 'draft' if ddt.stato == 'bozza' else '' }}">
                        <td><strong>{{ ddt.numero_ddt or '-' }}</strong></td>
                        <td>{{ ddt.data_ddt.strftime('%d/%m/%Y') if ddt.data_ddt else '-' }}</td>
                        <td>{{ ddt.destinazione }}</td>
                        <td>{{ ddt.magazzino_partenza }}</td>
                        <td>
                            <span class="status {{ 'confirmed' if ddt.stato == 'confermato' else 'draft' }}">
                                {{ ddt.stato|capitalize }}
                            </span>
                        </td>
                        <td class="actions">
                            <button class="btn btn-small">Visualizza</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
