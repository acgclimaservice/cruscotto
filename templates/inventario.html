
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Sistema Gestione DDT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=3">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/">🏠 Dashboard</a></li>
            </ul>
        </nav>

        <div class="ddt-header">
            <h1>📦 Inventario Magazzino</h1>
            <p>Gestione completa dell'inventario e delle giacenze di magazzino</p>
        </div>

        <div class="table-container">
            <h3>Articoli in Giacenza</h3>
            <table>
                <thead>
                    <tr>
                        <th>Codice</th>
                        <th>Descrizione</th>
                        <th>Giacenza</th>
                        <th>Stato</th>
                        <th>Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px;">
                            📦 Nessun articolo in inventario
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
