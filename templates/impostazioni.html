<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostazioni - Sistema Gestione DDT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=3">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/">🏠 Dashboard</a></li>
            </ul>
        </nav>

        <div class="ddt-header">
            <h1>⚙️ Impostazioni Sistema</h1>
        </div>

        <div class="table-container">
            <h3>Configurazioni di Sistema</h3>
            <table>
                <thead>
                    <tr>
                        <th>Configurazione</th>
                        <th>Valore</th>
                        <th>Descrizione</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>Nome Azienda</strong></td>
                        <td>Azienda S.r.l.</td>
                        <td>Ragione sociale dell'azienda</td>
                    </tr>
                    <tr>
                        <td><strong>Partita IVA</strong></td>
                        <td>12345678901</td>
                        <td>Numero di Partita IVA</td>
                    </tr>
                    <tr>
                        <td><strong>Email</strong></td>
                        <td>info@azienda.it</td>
                        <td>Email aziendale principale</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
