<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornitori - Sistema Gestione DDT</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=3">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/">🏠 Dashboard</a></li>
            </ul>
        </nav>

        <div class="ddt-header">
            <h1>🏭 Anagrafica Fornitori ({{ fornitori|length }})</h1>
            <div class="filters">
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📤 Importa Excel</button>
                <button class="btn btn-success">+ Nuovo Fornitore</button>
                <button class="btn btn-danger" onclick="eliminaTuttiFornitori()">🗑️ Elimina Tutti</button>
                <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls" onchange="uploadFile(this)">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Ragione Sociale</th>
                        <th>P.IVA</th>
                        <th>Città</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    {% for fornitore in fornitori %}
                    <tr>
                        <td><strong>{{ fornitore.ragione_sociale }}</strong></td>
                        <td>{{ fornitore.partita_iva }}</td>
                        <td>{{ fornitore.citta }}</td>
                        <td>{{ fornitore.email }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 40px;">
                            🏭 Nessun fornitore presente
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
    function uploadFile(input) {
        if (input.files && input.files[0]) {
            const formData = new FormData();
            formData.append("file", input.files[0]);
            
            fetch("/fornitori/importa", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message || `Importati: ${data.importati} fornitori`);
                location.reload();
            })
            .catch(err => alert("Errore: " + err));
        }
    }
    </script>
<script>
function eliminaTuttiFornitori() {
    if (confirm("ATTENZIONE: Eliminare TUTTI i fornitori?")) {
        fetch("/fornitori/elimina-tutti", {method: "POST"})
        .then(res => res.json())
        .then(data => {
            alert(`Eliminati: ${data.eliminati} fornitori`);
            location.reload();
        });
    }
}
</script>
</body>
</html>
